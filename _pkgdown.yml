url: https://niphr.github.io/csutil/

template:
  package: cstemplate
  params:
    hero:
      overline: "R package · List utilities"
      title: "Base-R list utilities."
      lede: >
        Utility functions for common base-R problems with lists — characterise list
        types, split lists into equal groups, and unnest data frames within named
        lists.
      cta:
        primary:
          text: "Get started"
          href: "articles/csutil.html"
        secondary:
          text: "Browse the reference →"
          href: "reference/index.html"

reference:
  - title: "List predicates"
    desc: "Inspect and characterise list structure."
    contents:
      - is_fully_named_list
      - is_all_list_elements_null_or_df
      - is_all_list_elements_null_or_fully_named_list
      - is_all_list_elements_null_or_list
  - title: "List manipulation"
    desc: "Split, unnest, and transform lists."
    contents:
      - easy_split
      - unnest_dfs_within_list_of_fully_named_lists
      - apply_fn_via_hash_table

authors:
  footer:
    roles: [cre, aut]
    text: "Crafted by"
  sidebar:
    roles: [cre, aut, cph]
  before: "This package is proudly brought to you by:"
  after: "See the [changelog](news/index.html) for other contributors. :pray:"
  Richard Aubrey White:
    href: "https://www.rwhite.no"
